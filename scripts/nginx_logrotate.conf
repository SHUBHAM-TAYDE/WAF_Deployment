/var/log/nginx/*.log {
	weekly
	missingok
	rotate 9
	compress
	delaycompress
	notifempty
	create 0640 www-data adm
	sharedscripts
	prerotate
		if [ -d /etc/logrotate.d/httpd-prerotate ]; then \
			run-parts /etc/logrotate.d/httpd-prerotate; \
		fi \
	endscript
	postrotate
		systemctl kill -s USR1 openresty.service >/dev/null 2>&1 || true
	endscript
}
